name: 更新分析页面

on:
  workflow_dispatch:
  schedule:
    # 每个交易日收盘后运行 (北京时间15:35 = UTC 07:35)
    - cron: '35 7 * * 1-5'

permissions:
  contents: write

concurrency:
  group: update-page-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 快速刷新美股行情
        run: python -u refresh_us_quotes_page.py

      - name: 先发布美股行情
        env:
          TIMESTAMP: ${{ github.run_id }}
        run: |
          git add docs/
          git diff --cached --quiet || git commit -m "快速更新美股行情"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - name: 生成完整页面
        run: |
          set +e
          timeout 600s python -u generate_page.py
          status=$?
          echo "FULL_GENERATE_STATUS=$status" >> "$GITHUB_ENV"
          if [ "$status" -ne 0 ]; then
            echo "::warning::完整页面生成失败或超时，本次保留已发布的快速美股行情。status=$status"
          fi
          exit 0

      - name: 提交并推送完整页面
        if: env.FULL_GENERATE_STATUS == '0'
        env:
          TIMESTAMP: ${{ github.run_id }}
        run: |
          git add docs/
          git diff --cached --quiet || git commit -m "自动更新数据"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
